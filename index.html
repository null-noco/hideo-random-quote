<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>握野英雄 セリフランダム</title>
<style>
:root {
  --bg:#f4f5f7; --card:#fff; --text:#24272d; --sub:#747b85;
  --accent:#73b8e2; --accent-hover:#5aa4d1; --border:#e2e5e9;
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; padding:24px; background:var(--bg);
  color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
}
.app{width:min(720px,100%);margin:40px auto}
h1{margin:0 0 8px;font-size:clamp(25px,5vw,38px)}
.lead{margin:0 0 22px;color:var(--sub);font-size:14px;line-height:1.7}
.quote-card{
  position:relative;
  height:320px;display:flex;flex-direction:column;justify-content:flex-start;
  padding:clamp(28px,6vw,54px);border:1px solid var(--border);border-radius:20px;
  background:var(--card);box-shadow:0 12px 34px rgba(25,30,40,.07)
}
.category{margin-bottom:18px;color:var(--accent);font-size:13px;font-weight:700;letter-spacing:.07em}
.quote{margin:0;font-size:clamp(20px,4.3vw,28px);line-height:1.75;font-weight:650}
.controls{display:grid;grid-template-columns:minmax(0,1fr) 104px 176px;gap:12px;margin-top:16px}
.favorite-heart{
  position:absolute;right:16px;bottom:16px;
  width:48px;min-height:48px;padding:0;
  border:1px solid var(--border);border-radius:50%;
  background:rgba(255,255,255,.95);
  color:var(--accent);
  font-size:29px;font-weight:400;line-height:1;
  box-shadow:0 5px 16px rgba(25,30,40,.08);
  transition:transform .15s ease,background .15s ease
}
.favorite-heart:hover{background:#f5fbff}
.favorite-heart:active{transform:scale(.92)}
.favorite-heart.is-favorite{color:var(--accent)}
.mode-bar{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.mode-button{
  min-height:42px;padding:0 15px;
  border:1px solid var(--border);
  background:var(--card);color:var(--text)
}
.mode-button.active{
  border-color:var(--accent);
  background:var(--accent);color:#fff
}
.favorite-list{
  display:none;margin-top:18px;padding:18px;
  border:1px solid var(--border);border-radius:16px;background:var(--card)
}
.favorite-list.is-open{display:block}
.favorite-list h2{margin:0 0 10px;font-size:17px}
.favorite-empty{margin:0;color:var(--sub);font-size:14px}
.favorite-item{padding:14px 0;border-top:1px solid var(--border)}
.favorite-item:first-child{border-top:0}
.favorite-item-category{margin-bottom:5px;color:var(--accent);font-size:12px;font-weight:700}
.favorite-item-text{margin:0;line-height:1.7}
.favorite-remove{
  min-height:36px;margin-top:8px;padding:0 12px;
  border:1px solid var(--border);background:#fff;color:var(--text);font-size:12px
}
button,.file-label{
  min-height:52px;padding:0 20px;border-radius:13px;font:inherit;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer
}
#next{border:0;background:var(--accent);color:#fff}
#next:hover{background:var(--accent-hover)}
#copy,#showFavorites,.file-label{border:1px solid var(--border);background:var(--card);color:var(--text)}
#copy,#showFavorites{width:100%;white-space:nowrap}
.import-box{
  margin-top:20px;padding:18px;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.72)
}
.import-title{margin:0 0 7px;font-size:15px}
.import-help{margin:0 0 14px;color:var(--sub);font-size:13px;line-height:1.65}
.import-actions{display:flex;gap:10px;flex-wrap:wrap}
input[type=file]{position:absolute;inline-size:1px;block-size:1px;opacity:0;pointer-events:none}
.status{margin:12px 0 0;color:var(--sub);font-size:12px;line-height:1.6}
.meta{display:flex;justify-content:space-between;gap:12px;margin-top:14px;color:var(--sub);font-size:12px}
.meta a{color:inherit}
@media(max-width:520px){
  .controls{grid-template-columns:1fr}
  .mode-bar{display:grid}
  .mode-button{width:100%}
  .meta{flex-direction:column}
  .import-actions{display:grid}
}
</style>
</head>
<body>
<main class="app">
  <h1>握野英雄 セリフランダム</h1>
  <p class="lead">ボタンを押すたびに、収録セリフからランダムに表示します。</p>

  <section class="quote-card" aria-live="polite">
    <button class="favorite-heart" id="favoriteHeart" type="button" aria-label="お気に入りに追加">♡</button>
    <div class="category" id="category">共通・恒常</div>
    <blockquote class="quote" id="quote">おは…ん？もっと笑顔であいさつしろって？なるほど…こうでいいか。お、おはよう！うーん、難しいな…。</blockquote>
  </section>

  <div class="controls">
    <button id="next" type="button">別のセリフを見る🦈</button>
    <button id="copy" type="button">コピー</button>
    <button id="showFavorites" type="button">お気に入り一覧</button>
  </div>

  <div class="mode-bar">
    <button class="mode-button active" id="modeAll" type="button">すべてからランダム</button>
    <button class="mode-button" id="modeFavorites" type="button">お気に入りだけランダム</button>
  </div>

  <section class="favorite-list" id="favoriteList">
    <h2>お気に入り</h2>
    <div id="favoriteItems"></div>
  </section>

  <div class="meta">
    <span id="count">630件収録</span>
    <a href="https://wikiwiki.jp/sidem/%E6%8F%A1%E9%87%8E%20%E8%8B%B1%E9%9B%84" target="_blank" rel="noopener noreferrer">元ページを開く</a>
  </div>
</main>

<script>
const fallbackQuotes = [{"category":"共通・恒常","text":"おは…ん？もっと笑顔であいさつしろって？なるほど…こうでいいか。お、おはよう！うーん、難しいな…。"},{"category":"共通・恒常","text":"ﾌﾟﾛﾃﾞｭｰｻｰを支えるために、俺もずいぶん頑張ったんだぞ。ちょっと成果を見てくれないか。"},{"category":"共通・恒常","text":"よっ。ってそんな驚くなよ…わ、笑うな…！そんな意地悪な奴には差し入れやんねーぞ！…まあ、嘘だけどよ。ほら、受け取れよ。"},{"category":"共通・恒常","text":"よっ。って毎度驚くなよ！…もしかして、わざとか？意地悪な奴には差し入れやんねーぞ！…嘘だよ。ほら、受け取れ。じゃ、最後までよろしく頼むぜ。"},{"category":"共通・恒常","text":"大丈夫だ、俺がついてる。前を見ろ。"},{"category":"共通・恒常","text":"よし、準備は万全。いつでも行けるぜ。ﾀｵﾙ用意して待っててくれ。"},{"category":"共通・恒常","text":"ｶﾚﾝﾀﾞｰに印をつけて…と。これでよし！俺たちの歌、早く届けたいな。"},{"category":"共通・恒常","text":"子供たちや仲間のためにも、絶対に負けられねぇ。本気で行くぜ。"},{"category":"共通・恒常","text":"笑顔って、嬉しい時は自然にあふれてくるもんだよな。うん、頑張るよ。"},{"category":"共通・恒常","text":"俺がﾘｰﾀﾞｰ？ああ、任されたぜ。それじゃ、まずはみんなで飯食いに行くか！ほら、おまえら何が食いたい？"},{"category":"共通・恒常","text":"個性的なﾔﾂらをまとめるのは苦労するが、みんなの笑顔が俺の糧になってる。まだまだ、遠くに行けそうだ。"},{"category":"共通・恒常","text":"俺は、世界中のﾌｧﾝや子どもたちを、もっと幸せにしたい。だからみんな、俺に力を貸してくれ。"},{"category":"共通・恒常","text":"正直、俺ひとりじゃ大したことはできねぇ。仲間と、ﾌﾟﾛﾃﾞｭｰｻｰの支えがあってこそだ。心から感謝するぜ。"},{"category":"共通・恒常","text":"ﾌﾟﾛﾃﾞｭｰｻｰは、いつも俺を支えてくれる縁の下の力持ちって感じかな。それと、俺の笑顔を褒めてくれるぜ。"},{"category":"共通・恒常","text":"成績を褒められると嬉しくなるぜ。けどそれはﾌﾟﾛﾃﾞｭｰｻｰのおかげなんだ。感謝してるよ。"},{"category":"共通・恒常","text":"よう、元気か？ 困ったことがあったら、いつでも俺に相談しろよ。"},{"category":"共通・恒常","text":"目付きの悪さは生まれつきでな。しょっちゅう子どもに泣かれてるよ。"},{"category":"共通・恒常","text":"なんだ、人の顔をじろじろ見て。俺の笑顔がそんなにめずらしいか？"},{"category":"共通・恒常","text":"ああ、そのまま笑っててくれ。真似するから。その笑顔が一番いい。"},{"category":"共通・恒常","text":"特訓した笑顔、なかなかｳｹがよかったぞ。 今度からこれで行こう。"},{"category":"共通・恒常","text":"ﾌﾟﾛﾃﾞｭｰｻｰの顔芸のおかげで、思いっきり笑っちまっただろうが！"},{"category":"共通・恒常","text":"うまく笑顔が作れない時は、あんたの顔を思い出すことにしてるんだ。"},{"category":"共通・恒常","text":"子どもはかわいいし好きなんだが、怖がらせて泣かせてしまうのがな…どうしたらいいものか。"},{"category":"共通・恒常","text":"ﾌﾟﾛﾃﾞｭｰｻｰの秘策のおかげで子どもにﾓﾃﾓﾃになれたよ！ﾋｰﾛｰごっこの怪人役とは思いつかなかったな…。"},{"category":"共通・恒常","text":"ﾌﾟﾛﾃﾞｭｰｻｰも今度一緒に、幼稚園ﾊﾞｽｼﾞｬｯｸごっこをやろう。童心に帰ってはしゃぐのも悪くはないぞ。"},{"category":"共通・恒常","text":"ﾌﾟﾛﾃﾞｭｰｻｰは俺の憧れのﾋｰﾛｰだよ。俺もいつかは、ﾌﾟﾛﾃﾞｭｰｻｰのような立派な人になりたいな…。"},{"category":"共通・恒常","text":"うちのﾌﾟﾛﾃﾞｭｰｻｰの真心がたっぷり詰まった差し入れ、あたたかいだろ？"},{"category":"共通・恒常","text":"へっ、にらみ合いなら俺に任せとけ。"},{"category":"共通・恒常","text":"よぉ、ﾌﾟﾛﾃﾞｭｰｻｰ、お疲れ。"},{"category":"共通・恒常","text":"ちょっと一息ついていくか？俺も今休憩中なんだ。"},{"category":"共通・恒常","text":"お、そろそろ次の出動か？いつでも笑顔で、行ってこいよ！"},{"category":"共通・恒常","text":"俺の顔、怖いか？"},{"category":"共通・恒常","text":"ﾌﾟﾛﾃﾞｭｰｻｰ！おみや、ありがとうな。"},{"category":"共通・恒常","text":"あ？ 怖いのか？ だったら今のうちに仲間の元へ帰るんだな…。"},{"category":"共通・恒常","text":"俺の仲間は必ず守ってみせる…！"},{"category":"共通・恒常","text":"…いいぜ。さっさとかかってきな。"},{"category":"共通・恒常","text":"こんな俺を信じてくれる人のためにも、ｶｯｺいいとこ見せないとな！"},{"category":"共通・恒常","text":"俺は決して1人じゃない！"},{"category":"共通・恒常","text":"勝っ…た？勝った！俺達の勝利だ！"},{"category":"共通・恒常","text":"…こんな気持ちは二度とごめんだ。"},{"category":"共通・恒常","text":"早く思いっきり歌いたいもんだ。"},{"category":"共通・恒常","text":"感じ取れ！お前達と俺達と、全てが一体になってるんだ！！"},{"category":"共通・恒常","text":"ﾌﾟﾛﾃﾞｭｰｻｰ！俺、ここで引き下がりたくない。ﾁｬﾝｽをくれ！"},{"category":"共通・恒常","text":"ひいじいちゃんじいちゃんばあちゃんみんなー！俺はやりきったぞー！"},{"category":"共通・恒常","text":"心が繋がるなんてこと、本当にあるんだな…！"},{"category":"共通・恒常","text":"俺の歌は届いたな！お前達は誰だって一人じゃないんだ！！"},{"category":"共通・恒常","text":"まばたきをしてる暇はなさそうだ。おびえるな、この機会をとらえるぞ！"},{"category":"共通・恒常","text":"今日は自然と笑っちまえるな。最高の歌を届けられそうだぜ！"},{"category":"共通・恒常","text":"あけましておめでとう。いい正月は過ごせそうか？うちは大人数で賑やかだし客が来ると喜ぶから、もしよければ雑煮でも食いに来てくれよ。"},{"category":"共通・恒常","text":"ｱｲﾄﾞﾙになる前は、ﾊﾞﾚﾝﾀｲﾝにﾁｮｺをくれるのは家族くらいだったんだけどな。いや、家族からもらう義理ﾁｮｺだってすっげー嬉しいんだぜ！"},{"category":"共通・恒常","text":"今日はﾎﾜｲﾄﾃﾞｰか…ﾎﾜｲﾄﾃﾞｰって昔は必ず雪が降ると思い込んでたんだけど、季節的に絶対降るわけじゃないよな。降ったら楽しいんだけどな？"},{"category":"共通・恒常","text":"なぁﾌﾟﾛﾃﾞｭｰｻｰ、今度みんなで花見に行かないか？とっておきの場所を知ってるんだ。信玄と龍も誘ってさ、きっと楽しいぜ。"},{"category":"共通・恒常","text":"うちには先祖代々から伝わる立派な兜飾りと鯉のぼりがあって、今でも子どもの日にはちゃんと飾ってるな。最近じゃ結構珍しいだろ？"},{"category":"共通・恒常","text":"雨が降ると外回りに出るのが大変なんだよな。非番の時にぼんやり二度寝しながら雨の音を聞くのは好きだったぜ。なんか得してる気分になる。"},{"category":"共通・恒常","text":"あっという間の毎日だったが、走り続けてきたことは後悔してないぜ。俺はこれからも子どもたちの笑顔のために、心をこめて歌い続けたい…！"},{"category":"共通・恒常","text":"これだけ暑いと海に行きたくならねぇ？行きたいだろ？よしっ！次の休日、空けといてくれよ。信玄と龍の予定も押さえとくからな！"},{"category":"共通・恒常","text":"9月になったら涼しくなるかと思ったら全然だぜ。早く秋になるといいよな、行楽ｼｰｽﾞﾝはあちこち出歩くのが楽しいんだ。"},{"category":"共通・恒常","text":"ﾊﾛｳｨﾝにお菓子を配る相手なんているもんか…仮装した子どもはみんな、俺を見て逃げてくんだぞ！どっちがお化けだって話だぜ…"},{"category":"共通・恒常","text":"小さい頃はよく、家族全員で紅葉を見に山へ登ってたんだ。しばらく見てないけど、目をつぶれば思い出せるぐらいきれいな色をしてたな…"},{"category":"共通・恒常","text":"あっ、今日はｸﾘｽﾏｽだったか…どうすっかな、なんにも用意してないんだけど…そうだ、ﾒｼでもおごろうか。信玄と龍も誘うからさ。"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"ﾌﾟﾛﾃﾞｭｰｻｰ、あんたといればできないことはないって気がしてくるよ。これからもよろしく頼む。"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"嬉しいことは2回と言わず何度だって経験したいよな。まだまだ攻めていこうぜ、ﾌﾟﾛﾃﾞｭｰｻｰ。"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"ﾌﾟﾛﾃﾞｭｰｻｰのおかげで、こうして何度も結果を出せてｽｯｹﾞｰ嬉しいぜ！今日はみんなでお祝いだ！"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"ﾌﾟﾛﾃﾞｭｰｻｰが一緒だと、全身に気合いが入るんだ。それがいい結果を生み出してるんだろうな。"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"この特別な勝利は俺たちとﾌﾟﾛﾃﾞｭｰｻｰが一緒に掴んだんだろ！隅にいないで真ん中に来いって！"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"おはよう、ﾌﾟﾛﾃﾞｭｰｻｰ。さっすが、もう仕事ｽｲｯﾁが入ってんな。いつもながら頼りにしてるぜ。"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"見てくれよ、ﾄﾚﾗﾝ用のｼｭｰｽﾞを新調したんだ。今度の休み、ﾌﾟﾛﾃﾞｭｰｻｰも一緒に山に行かないか？"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"おかえり、ﾌﾟﾛﾃﾞｭｰｻｰ。疲れると糖分が欲しくなるだろ？ｸﾘｰﾑたっぷりのﾊﾟﾝｹｰｷ、用意したぜ。"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"今から外出か？いや用があったわけじゃない。ほら、遅刻するぞ。いってらっしゃい、ﾌﾟﾛﾃﾞｭｰｻｰ。"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"本当に送らなくていいのか？なら夜道には気をつけて帰るんだぜ。じゃ、おやすみ、ﾌﾟﾛﾃﾞｭｰｻｰ。"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"上手くﾌｫﾛｰしてくれたんで、子どもたちも笑顔になってくれたぜ。ありがとよ、ﾌﾟﾛﾃﾞｭｰｻｰ。"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"ｵｽｽﾒの朝食は、やっぱﾊﾟﾝｹｰｷだな。今度、ﾌﾟﾛﾃﾞｭｰｻｰにも、綺麗に焼くｺﾂを教えてやろうか？"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"この前、大型犬用のｵﾓﾁｬを買ったんだ。今度ﾌﾟﾛﾃﾞｭｰｻｰも、うちの犬たちと遊んでやってくれ。"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"ただいま、ﾌﾟﾛﾃﾞｭｰｻｰ。子どもたち全員にｻｲﾝを書いてたら、今まで時間がかかっちまったぜ。"},{"category":"UPC ﾘｰﾀﾞｰ任命","text":"近所の子どもたちが、俺の顔に怯えなくなったんだ。ﾌﾟﾛﾃﾞｭｰｻｰと、笑顔の練習をした成果だな。"},{"category":"【ﾎﾟﾘｽｱｲﾄﾞﾙ】握野 英雄","text":"握野英雄、23歳。これでも一応元警察官だ。顔が怖い？ よく言われるよ。ｱｲﾄﾞﾙは顔だけじゃないだろ？ 歌もﾀﾞﾝｽも頑張るから、よろしくな。"},{"category":"【ﾎﾟﾘｽｱｲﾄﾞﾙ】握野 英雄","text":"俺を怖がりもせずに応援してくれる子が増えて、嬉しいと言うか、かなり照れるな…。ﾌｧﾝの子のためにも、これからもっと頑張っていくぞ。"},{"category":"【ﾎﾟﾘｽｱｲﾄﾞﾙ】握野 英雄","text":"握野英雄、23歳。…目付きの悪さは生まれつきだ、悪かったな。にらんだつもりはないって、緊張してるんだよ！"},{"category":"【ﾎﾟﾘｽｱｲﾄﾞﾙ】握野 英雄","text":"ｱｲﾄﾞﾙﾕﾆｯﾄとして大切なのは、ﾁｰﾑﾜｰｸだと思うんだ。絆を深めるためにも、仲間との話し合いは欠かせないな。"},{"category":"【ﾎﾟﾘｽｱｲﾄﾞﾙ】握野 英雄","text":"目指すは信玄と龍を支える、一家の大黒柱なんだが…ちょっとは貫禄が増したように見えると嬉しいな。"},{"category":"【悪人面のﾋｰﾛｰ】握野 英雄","text":"握野英雄、23歳だ。特に頑張りたいのは歌かな…。いつかはﾌﾟﾛﾃﾞｭｰｻｰを本気で感動させられるよう、頑張るつもりだ。これからよろしく頼む。"},{"category":"【悪人面のﾋｰﾛｰ】握野 英雄","text":"まだまだ未熟だが、最初よりずっと歌が良くなっただろう？ ﾌﾟﾛﾃﾞｭｰｻｰのおかげだよ。もっと練習を積んで、人を感動させられるｱｲﾄﾞﾙを目指すぞ。"},{"category":"【悪人面のﾋｰﾛｰ】握野 英雄","text":"握野英雄、23歳。警察官だ。…今ﾋﾞｯｸﾘしただろ？よく悪人面とは言われるよ。怖がらなかっただけで充分だ。"},{"category":"【悪人面のﾋｰﾛｰ】握野 英雄","text":"ﾎｯﾄｹｰｷが絶品の店があるんだが、今度一緒に行かないか。ﾌﾟﾛﾃﾞｭｰｻｰもきっとあの味のとりこになるぞ…。"},{"category":"【悪人面のﾋｰﾛｰ】握野 英雄","text":"ﾌﾟﾛﾃﾞｭｰｻｰからすれば、俺はまだまだﾋﾖｺだろうか。今の気分は狼のつもりなんだがな。…ｶﾞｵｰ？"},{"category":"【笑顔を見せて】握野 英雄","text":"公園にいた迷子の件だが…お、了解！…よかったな、おまえの家族見つかったぞ！今向かうってさ。はは、安心したか？もう迷子になるんじゃないぞ。"},{"category":"【笑顔を見せて】握野 英雄","text":"俺は孤独を抱えた人たちに、1人じゃないって伝えたい。歌の力でなら、みんなに伝えられるって信じてるんだ！おし、今日も全力で歌うからな！"},{"category":"【笑顔を見せて】握野 英雄","text":"怖かっただろうに…よく声をかけてくれたな。おまえの家族は絶対に見つける。だから、安心して待ってろよ。"},{"category":"【笑顔を見せて】握野 英雄","text":"家族と会えた時の、あの迷子の笑顔が忘れられねぇな…よし、この後のﾊﾟﾄﾛｰﾙも気合い入れていくか！"},{"category":"【笑顔を見せて】握野 英雄","text":"寂しさを感じている人がいたら、いつだって俺たちは一緒だって思いを、歌とﾊﾟﾌｫｰﾏﾝｽに込めて届けるぜ。"},{"category":"【笑顔を見せて】握野 英雄","text":"新しくﾊﾟﾝｹｰｷの店ができたらしいぜ。あんたも一緒に行ってみないか？"},{"category":"【笑顔を見せて】握野 英雄","text":"あんたにはいつも感謝してる。困ったことがあればなんでも言ってくれ。"},{"category":"【笑顔を見せて】握野 英雄","text":"お、いい毛並み…街中に犬がいるとつい目で追っちまうんだよな。"},{"category":"【笑顔を見せて】握野 英雄","text":"俺が伝えたい思いやﾒｯｾｰｼﾞが多くの人に届くように、これからも頑張るよ。あんたも応援してくれよな。"},{"category":"【正義が恋人】握野 英雄","text":"婚約指輪ってこんなに華奢なのか。これが「一生決めた相手を守り続ける」印なんて……何かすげぇよな。"},{"category":"【正義が恋人】握野 英雄","text":"どうだ？なかなかｶｯｺよかっただろう？これでいつ結婚式を挙げても大丈夫かな……今くらい、ちょっと自分に自信持ってもいいだろ？"},{"category":"【正義が恋人】握野 英雄","text":"広い会場での撮影は、のびのびしていて気分が良いぜ！"},{"category":"【正義が恋人】握野 英雄","text":"でっかいﾀﾞｲﾔﾓﾝﾄﾞだな。ｷﾗｷﾗ光ってるぜ。値段を考えると……ちょっとﾋﾞﾋﾞるぜ……"},{"category":"【正義が恋人】握野 英雄","text":"こーゆーｶｯｺしてれば、少しは目つきが悪いのも軽減されるだろ？さて、撮影に行こう。"},{"category":"【正義が恋人】握野 英雄","text":"痛っ……八重歯があると口内炎ができやすいんだ。"},{"category":"【正義が恋人】握野 英雄","text":"ﾌﾟﾛﾃﾞｭｰｻｰの笑顔は参考になるな。じっと見ちまう。"},{"category":"【正義が恋人】握野 英雄","text":"俺の笑顔も捨てたもんじゃないぜ！？どうだ？"},{"category":"【ﾏｽｶﾚｰﾄﾞ】握野 英雄","text":"この仮面…うーん…どうせ顔を隠すんなら、もうちょっと正義のﾋｰﾛｰっぽくても…いや、もちろん仕事なんだからきっちりやるけどな。"},{"category":"【ﾏｽｶﾚｰﾄﾞ】握野 英雄","text":"ﾊｯﾊｯﾊ、我こそは怪盗ﾀﾞｰｸﾈｽ！…我ながら似合いすぎて悲しくなるﾚﾍﾞﾙだぜ。もういい加減吹っ切れた。この舞台、俺が絶対に成功させてやる！"},{"category":"【ﾏｽｶﾚｰﾄﾞ】握野 英雄","text":"舞台の仕事なんて初めてだからな。うれしいけど正直緊張するぜ…なぁ、俺ちゃんと笑えてるかな？"},{"category":"【ﾏｽｶﾚｰﾄﾞ】握野 英雄","text":"なぁ、今回の役がきたのってやっぱり俺の顔が怖いせいか？いいぜ、こうなったら完璧な悪役を演じてやる！"},{"category":"【ﾏｽｶﾚｰﾄﾞ】握野 英雄","text":"このな、ﾏﾝﾄをﾊﾞｻｰｯと上手くひるがえすとﾋｰﾛｰっぽくなるんだよ！ちょっと見ててくれ、ﾌﾟﾛﾃﾞｭｰｻｰ！"},{"category":"【ﾏｽｶﾚｰﾄﾞ】握野 英雄","text":"今日の仕事はじいちゃんたちに見せても恥ずかしくない出来だったな。"},{"category":"【ﾏｽｶﾚｰﾄﾞ】握野 英雄","text":"眠い時って人相が悪くなるんだよな…怖い顔してたら叱ってくれ。"},{"category":"【ﾏｽｶﾚｰﾄﾞ】握野 英雄","text":"拍手の量でわかるぜ。今日の仕事がどれだけうまくいったかってな！"},{"category":"【優しき強面】握野 英雄","text":"いつも応援ありがとう。これは俺からの気持ちだ……今、結構上手く笑えてたよな？今の感じだな？よし、後は本番だ！見ててくれよﾌﾟﾛﾃﾞｭｰｻｰ！"},{"category":"【優しき強面】握野 英雄","text":"ﾊﾞﾚﾝﾀｲﾝのﾁｮｺをあんなにもらうなんて初めてでさ。あー、照れるけど本気で嬉しかった。お返しに全力で歌うから、最後まで聞いてってくれよ！"},{"category":"【優しき強面】握野 英雄","text":"このお菓子をﾌｧﾝに配ればいいんだな？……わかってるよ、笑顔だろ。俺だって笑顔ぐらい作れる。"},{"category":"【優しき強面】握野 英雄","text":"龍と笑顔の特訓してたんだけど、もうちょっと頑張れって言われたんだ。頑張ってはいるんだけどな…"},{"category":"【優しき強面】握野 英雄","text":"衣装着たほうが落ち着くってのも変な話かな？でも1対1でお菓子渡すのは相当緊張したぞ。"},{"category":"【優しき強面】握野 英雄","text":"今日は一人か？仕事終わったら一緒に飯食いに行かないか！"},{"category":"【優しき強面】握野 英雄","text":"今日の仕事でまた一段とﾌﾟﾛﾃﾞｭｰｻｰとの絆が深まった気がするな。"},{"category":"【優しき強面】握野 英雄","text":"ﾌﾟﾛﾃﾞｭｰｻｰと結んだ絆は、俺の心にしっかりと刻み込まれたからな！"},{"category":"【ｱｸｱﾘｳﾑ】握野 英雄","text":"ﾌﾟﾛﾃﾞｭｰｻｰ、俺とｻﾒが似てる、って考えてるだろ…俺もそう思う。でも、嫌じゃないぜ。ｺｲﾂを見てるうちに、だんだん可愛いくなってきたしな。"},{"category":"【ｱｸｱﾘｳﾑ】握野 英雄","text":"ｵﾗｵﾗどけどけ～！海のﾋｰﾙ、ｼｬｰｸ握野のお通りだ！へっ、様になってるだろ？これなら胸張って堂々と笑えるぜ！"},{"category":"【ｱｸｱﾘｳﾑ】握野 英雄","text":"この面構えといい、鋭い歯といい…なんだか親近感が湧いてくるぜ。こいつとはいい友達になれそうだ。"},{"category":"【ｱｸｱﾘｳﾑ】握野 英雄","text":"ｻﾒの歯って、折れてもまた生えてくるんだってな…今、俺も同じなんじゃないかって考えただろ。"},{"category":"【ｱｸｱﾘｳﾑ】握野 英雄","text":"どうだ、そっくりだろ？噛み付かれないように気をつけな！ってね。お、今のﾌﾚｰｽﾞ、使えるかもな。"},{"category":"【ｱｸｱﾘｳﾑ】握野 英雄","text":"鏡があれば、自分の笑顔をﾁｪｯｸしてるんだ。いつでも気は抜けねえ。"},{"category":"【ｱｸｱﾘｳﾑ】握野 英雄","text":"俺が笑えばみんなも笑う、そういうｱｲﾄﾞﾙになってみせるぜ。"},{"category":"【ｱｸｱﾘｳﾑ】握野 英雄","text":"あれは…迷子か？ﾌﾟﾛﾃﾞｭｰｻｰ、ちょっと行ってくるぜ。"},{"category":"【ｱｸｱﾘｳﾑ】握野 英雄","text":"ﾌﾟﾛﾃﾞｭｰｻｰが喜びゃ俺も嬉しい。そういう時は自然と笑顔が出てくるんだ。"},{"category":"【ｱｸｱﾘｳﾑ】握野 英雄","text":"海のﾋｰﾙを舐めるなよ！！"},{"category":"【ｱﾆﾏﾙﾄﾚｰﾅｰ】握野 英雄","text":"とぉりゃ！…ﾃﾚﾋﾞ向けにｶｯｺいいﾌﾘｽﾋﾞｰの投げ方なんて、ちょっとﾑﾁｬぶり過ぎねえか？どうも意識し過ぎて身体がｶﾁｺﾁになっちまうぜ。"},{"category":"【ｱﾆﾏﾙﾄﾚｰﾅｰ】握野 英雄","text":"ははっ…くすぐったいって…！よしよし、ﾅｲｽｷｬｯﾁだったぜ！ほら、ﾌﾟﾛﾃﾞｭｰｻｰもこいつの頭撫でてみろよ。ふわっふわで気持ちいいぜ！"},{"category":"【ｱﾆﾏﾙﾄﾚｰﾅｰ】握野 英雄","text":"昔から犬の躾は得意なんだ。怒るときはちゃんと怒る、遊ぶときは一緒におもいっきり遊ぶってな。"},{"category":"【ｱﾆﾏﾙﾄﾚｰﾅｰ】握野 英雄","text":"ｺﾂは、良いことをしたら思い切り褒めてやる。ﾌﾟﾛﾃﾞｭｰｻｰも、俺のこともっと褒めてくれても…なんてな！"},{"category":"【ｱﾆﾏﾙﾄﾚｰﾅｰ】握野 英雄","text":"これでおもいっきりｱｲﾂと遊べるな！天気もいいし、芝生で一緒に寝そべりたいくらいだ。"},{"category":"【ｱﾆﾏﾙﾄﾚｰﾅｰ】握野 英雄","text":"ﾊﾟﾝｹｰｷに生ｸﾘｰﾑもいいけど、やっぱﾒｲﾌﾟﾙｼﾛｯﾌﾟが極上だって。"},{"category":"【ｱﾆﾏﾙﾄﾚｰﾅｰ】握野 英雄","text":"久々に信玄の料理が食いてえな。今度ﾌﾟﾛﾃﾞｭｰｻｰも一緒に食おうぜ。"},{"category":"【ｱﾆﾏﾙﾄﾚｰﾅｰ】握野 英雄","text":"ﾌｧﾝﾚﾀｰを読んでる時、優しい笑顔が出来てると自分でも思う。"},{"category":"【ｱﾆﾏﾙﾄﾚｰﾅｰ】握野 英雄","text":"俺は、子どもたちにもっと笑ってて欲しい。もちろん、ﾌﾟﾛﾃﾞｭｰｻｰや周りの仲間たちにもな。"},{"category":"【ｱﾆﾏﾙﾄﾚｰﾅｰ】握野 英雄","text":"思いっきり楽しんでいこうぜ！"},{"category":"【ｷｯﾁﾝｱｲﾄﾞﾙ】握野 英雄","text":"しっかしなんで料理対決でｶﾚｰなんだろうな…ﾌﾞｴｯｸｼｮｲ！うう、俺結構鼻がいいから、あんまり匂いの強いｽﾊﾟｲｽってﾀﾞﾒなんだよなぁ。"},{"category":"【ｷｯﾁﾝｱｲﾄﾞﾙ】握野 英雄","text":"材料準備OK。玉ねぎ捕獲完了。今からこいつをおいしく料理してやるぜ！安心してくれ、どんな玉ねぎが相手だろうが涙なんて見せないからな。"},{"category":"【ｷｯﾁﾝｱｲﾄﾞﾙ】握野 英雄","text":"よーし、皆並べ！腹減ってんだろ？俺がうまいｶﾚｰを腹いっぱい食わせてやるからな！"},{"category":"【ｷｯﾁﾝｱｲﾄﾞﾙ】握野 英雄","text":"うちのｶﾚｰっていつも妙にうまくてさ。あの味を再現できるかわからないが、努力はしてみるぜ。"},{"category":"【ｷｯﾁﾝｱｲﾄﾞﾙ】握野 英雄","text":"おお、ｶﾚｰ作りにはぴったりな雰囲気の衣装だな！気合いが入るぜ。"},{"category":"【ｷｯﾁﾝｱｲﾄﾞﾙ】握野 英雄","text":"大家族で育ったもんだから、1人での食事は苦手なんだよなぁ。"},{"category":"【ｷｯﾁﾝｱｲﾄﾞﾙ】握野 英雄","text":"皆で楽しく食べればどんな料理もうまくなる。俺の経験だけどな。"},{"category":"【ｷｯﾁﾝｱｲﾄﾞﾙ】握野 英雄","text":"思いっきり動いて、よく食べて寝る。これが健康維持の秘訣だ。"},{"category":"【ｷｯﾁﾝｱｲﾄﾞﾙ】握野 英雄","text":"信玄も龍もﾌﾟﾛﾃﾞｭｰｻｰも、今じゃ大事な家族みたいな気がするぜ。"},{"category":"【ｷｯﾁﾝｱｲﾄﾞﾙ】握野 英雄","text":"料理には余裕が必要だ。焦るとまずくなるっておふくろが言ってたぞ。"},{"category":"【ｷｯﾁﾝｱｲﾄﾞﾙ】握野 英雄","text":"努力は足りてたはずなんだけどな…もっと集中しないとﾀﾞﾒか。"},{"category":"【ｷｯﾁﾝｱｲﾄﾞﾙ】握野 英雄","text":"愛情をこめたら大成功だぜ。信玄と龍のｱﾄﾞﾊﾞｲｽどおりだったな！"},{"category":"【ｳｪｽﾀﾝ】握野 英雄","text":"西部劇の保安官役なんて俺にﾋﾟｯﾀﾘだよな。この仕事がうまくいくよう、乾杯！…なんだよ、酒じゃないとしまらないって？ｼﾞｭｰｽでもいいだろ！"},{"category":"【ｳｪｽﾀﾝ】握野 英雄","text":"『なにぃ、あの高額賞金首どもがこの町へやってきただと！こいつは大事件だ。俺がいるうちは絶対に、ここで好き勝手させねぇからな！』"},{"category":"【ｳｪｽﾀﾝ】握野 英雄","text":"正義の保安官参上！この町の平和は俺が守る！ってな。役作りならもうﾊﾞｯﾁﾘだぜ！"},{"category":"【ｳｪｽﾀﾝ】握野 英雄","text":"映画が完成したら、みんなで一緒に見に行きたいよな。ｽｸﾘｰﾝを通すとまた違った見え方になりそうだ。"},{"category":"【ｳｪｽﾀﾝ】握野 英雄","text":"正義の味方、出動！…悪役より悪い顔だなんて言うなよ？悪と渡り合うにはこのぐらいでいいんだよ。"},{"category":"【ｳｪｽﾀﾝ】握野 英雄","text":"うちのﾄﾞｰﾍﾞﾙﾏﾝは俺が1からしつけたんだ。2匹とも賢くて可愛いぜ。"},{"category":"【ｳｪｽﾀﾝ】握野 英雄","text":"元気か？うん、元気ならいいんだ。ﾌﾟﾛﾃﾞｭｰｻｰが元気ないと俺も困るから。"},{"category":"【ｳｪｽﾀﾝ】握野 英雄","text":"お疲れさん、っと。あ～腹減ったな…龍と信玄誘って飯でも行くか。"},{"category":"【ｳｪｽﾀﾝ】握野 英雄","text":"ﾆﾋﾙな笑顔が似合うだろ？へへっ、ﾌﾟﾛﾃﾞｭｰｻｰとの特訓のおかげだぜ！"},{"category":"【ｽﾀｰ･ｷﾞﾌﾄ】握野 英雄","text":"なかなかいいﾌﾟﾚｾﾞﾝﾄを買えたぜ。中身はなんだと思う？ﾋﾝﾄはｵｼｬﾚに使うものかな。もし当てられたら、同じﾔﾂをﾌﾟﾛﾃﾞｭｰｻｰにﾌﾟﾚｾﾞﾝﾄしてやるよ。"},{"category":"【ｽﾀｰ･ｷﾞﾌﾄ】握野 英雄","text":"いつもとﾒﾝﾂは違っても、いつも通りに歌うだけだ。ｸﾘｽﾏｽこそ世界中の子どもたちに歌を届けるﾁｬﾝｽだぜ。みんな、待っててくれよ！"},{"category":"【ｽﾀｰ･ｷﾞﾌﾄ】握野 英雄","text":"今年のｸﾘｽﾏｽもみんなで一緒に過ごせると思うと、うれしくて顔が緩んじまう…へへ、思い切り楽しもうな！"},{"category":"【ｽﾀｰ･ｷﾞﾌﾄ】握野 英雄","text":"ﾌﾟﾚｾﾞﾝﾄ選びって楽しいよな。渡した相手が喜んでくれると、ﾖｯｼｬｰ！って気分になるぜ。"},{"category":"【ｽﾀｰ･ｷﾞﾌﾄ】握野 英雄","text":"ｸﾘｽﾏｽの衣装って言うからｻﾝﾀの格好かと思ったら、すっげーｶｯｺｲｲじゃねーか。ﾃﾝｼｮﾝ上がるぜー！"},{"category":"【ｽﾀｰ･ｷﾞﾌﾄ】握野 英雄","text":"ん～んんん～♪…あっ、いたのかよ！？今の鼻歌、忘れてくれ…"},{"category":"【ｽﾀｰ･ｷﾞﾌﾄ】握野 英雄","text":"休憩しないのか？寝てる間の身辺警護なら、俺に任せてくれていいぜ。"},{"category":"【ｽﾀｰ･ｷﾞﾌﾄ】握野 英雄","text":"任務完了、っと。よし、ちょっと鏡で笑顔のおさらいしてくるぜ。"},{"category":"【ｽﾀｰ･ｷﾞﾌﾄ】握野 英雄","text":"俺の歌、ﾌﾟﾛﾃﾞｭｰｻｰにも届いてるかな。俺は自分の歌で、いろんな人にいろんな思いを伝えたいんだ。"},{"category":"【ｽﾀｰ･ｷﾞﾌﾄ】握野 英雄","text":"この歌を、世界中に届けてみせる！"},{"category":"【ｶｳﾝﾄﾀﾞｳﾝ2016】握野 英雄","text":"手を上げろ！染みも汚れも全員逮捕だ！…って、遊んでるわけじゃないって。これでも掃除は得意なんだからな。今から真面目にやるところだ。"},{"category":"【ｶｳﾝﾄﾀﾞｳﾝ2016】握野 英雄","text":"もう2015年も終わりか…1年が過ぎるのって早いよな。締めくくりの仕事は気合い入れてがんばるぜ！"},{"category":"【ｶｳﾝﾄﾀﾞｳﾝ2016】握野 英雄","text":"仕事ではあるけど、年末は信玄と龍とﾌﾟﾛﾃﾞｭｰｻｰと一緒に過ごせるんだよな。俺にとっては願ったりだ。"},{"category":"【ｶｳﾝﾄﾀﾞｳﾝ2016】握野 英雄","text":"気を引き締めて、笑顔を意識して、と。よしっ、俺の今年の集大成をﾗｲﾌﾞに全部ぶつけてくるぜ！"},{"category":"【ｶｳﾝﾄﾀﾞｳﾝ2016】握野 英雄","text":"なぁ、このあと一緒に喫茶店 y":"【強面ﾄﾞｸﾀｰ】握野 英雄","text":"よし、白衣と眼鏡で多少は医者っぽくなっただろ？本当にみんなの怪我を治せたら、いいんだけどな。"},{"category":"【強面ﾄﾞｸﾀｰ】握野 英雄","text":"ﾊﾟﾝｹｰｷ仲間が増えて嬉しいぜ。はは、男ばっかりだけどな。"},{"category":"【強面ﾄﾞｸﾀｰ】握野 英雄","text":"失敗も糧になる。お終いなんてないって、この仕事で改めて気づいたよ。"},{"category":"【強面ﾄﾞｸﾀｰ】握野 英雄","text":"経験を積み重ねることで、自信がつく。挑戦は大事だな。"},{"category":"【強面ﾄﾞｸﾀｰ】握野 英雄","text":"いつか俺が、理想通りに歌を歌えるようになったら…伝えたいことがいっぱいあるな。あんたに。"},{"category":"【甘党会会長】握野 英雄","text":"へへっ、ﾄﾞｰﾅﾂﾊﾟｰﾃｨだぜ。ﾃﾝｼｮﾝが上がっちまうな…！ひとまず最初は3個で抑えて、おかわりの時に夢のﾄﾞｰﾅﾂﾀﾜｰに挑戦だな！"},{"category":"【甘党会会長】握野 英雄","text":"一口食べれば口いっぱいに甘さが広がって、自然と笑顔になる。そんなﾄﾞｰﾅﾂみたいに、笑顔を呼ぶﾗｲﾌﾞにするぜ！めいっぱい味わってくれよな！"},{"category":"【甘党会会長】握野 英雄","text":"ﾄﾞｰﾅﾂももちろん好きだぜ！甘いもの万歳だ。ﾊﾟﾝｹｰｷとは違ったうまさがあるよなぁ…"},{"category":"【甘党会会長】握野 英雄","text":"次はあのﾄﾞｰﾅﾂも…いや、さすがにこの量はﾗｲﾌﾞに響くか？でも、ﾀｲｱｯﾌﾟするなら味のﾁｪｯｸは必要…だよな？"},{"category":"【甘党会会長】握野 英雄","text":"この派手な柄の衣装を…俺が着こなせてるって言ってんだな？よし、わかった。信じるからな、ﾌﾟﾛﾃﾞｭｰｻｰ！"},{"category":"【甘党会会長】握野 英雄","text":"ﾄﾞｰﾅﾂ食ってる春名を見てると、幸せを分けてもらってる気分になるぜ。"},{"category":"【甘党会会長】握野 英雄","text":"ﾌﾟﾛﾃﾞｭｰｻｰ、甘いものは平気か？付き合ってほしい店があるんだけど。"},{"category":"【甘党会会長】握野 英雄","text":"頭と体を酷使した後は、甘いものに限る。糖分補給ってやつだな。"},{"category":"【甘党会会長】握野 英雄","text":"ちょっと自信がない時でも、ﾌﾟﾛﾃﾞｭｰｻｰに背中をひと押しされるだけで胸を張れるんだ。魔法みたいだよな？"},{"category":"【Mﾌｪｽ 2017】握野 英雄","text":"このﾒﾛﾝﾊﾟﾝ、前からずっと食べたくってさ。ﾓｸﾞﾓ…ﾑｸﾞｯ！？ﾝｸﾞ、ﾝｸﾞｸﾞ…ﾌﾟﾊｰ！あぶねぇ、信玄が水くれなかったら死ぬとこだった…助かったぜ…"},{"category":"【Mﾌｪｽ 2017】握野 英雄","text":"今日みたいな気持ちいい日に、野外ﾗｲﾌﾞって最高だぜ！まだまだ盛り上げていくから、みんなも空に届くくらいの声きかせてくれよ！頼むぜ！"},{"category":"【Mﾌｪｽ 2017】握野 英雄","text":"ｻｰﾋﾞｽｴﾘｱ限定の大人気ﾒﾛﾝﾊﾟﾝ…ついに手に入れたぜ。これ、前から食べたくて狙ってたんだ、へへ。"},{"category":"【Mﾌｪｽ 2017】握野 英雄","text":"みんなの分もﾒﾛﾝﾊﾟﾝ買ってきたから、車の中で食おうな。ﾌﾟﾛﾃﾞｭｰｻｰも絶対気にいると思うぜ、これ。"},{"category":"【Mﾌｪｽ 2017】握野 英雄","text":"ﾌｪｽの衣装、すごくｲｲよな。みんなお揃いだと、俺たちは仲間なんだ！って感じも強くなるっていうかさ。"},{"category":"【Mﾌｪｽ 2017】握野 英雄","text":"昔世話んなった人のとこに挨拶してきたんだ。元気そうでよかったぜ。"},{"category":"【Mﾌｪｽ 2017】握野 英雄","text":"俺も作詞の勉強したいな。え？いや、ﾗﾌﾞｿﾝｸﾞは無理だ無理！"},{"category":"【Mﾌｪｽ 2017】握野 英雄","text":"小さい子に応援されちまった…やばい、すっげーﾃﾝｼｮﾝ上がった…！"},{"category":"【Mﾌｪｽ 2017】握野 英雄","text":"俺、ﾌﾟﾛﾃﾞｭｰｻｰの声好きなんだよな。聞いてると安心するっつーか。しゃべり方とかちょっと見習おうかな…"},{"category":" function updateFavoriteHeart() {
  const item = quotes[currentIndex];
  if (!item) {
    favoriteHeart.textContent = "♡";
    favoriteHeart.classList.remove("is-favorite");
    return;
  }
  const active = isFavorite(item);
  favoriteHeart.textContent = active ? "♥" : "♡";
  favoriteHeart.classList.toggle("is-favorite", active);
  favoriteHeart.setAttribute("aria-label", active ? "お気に入りから外す" : "お気に入りに追加");
}

function renderFavoriteList() {
  favoriteItems.innerHTML = "";
  const items = quotes.filter(isFavorite);

  if (!items.length) {
    const empty = document.createElement("p");
    empty.className = "favorite-empty";
    empty.textContent = "まだお気に入りはありません。セリフ右上の♡を押して追加できます。";
    favoriteItems.appendChild(empty);
    return;
  }

  items.forEach(item => {
    const wrapper = document.createElement("article");
    wrapper.className = "favorite-item";

    const category = document.createElement("div");
    category.className = "favorite-item-category";
    category.textContent = item.category;

    const body = document.createElement("p");
    body.className = "favorite-item-text";
    body.textContent = item.text;

    const remove = document.createElement("button");
    remove.type = "button";
    remove.className = "favorite-remove";
    remove.textContent = "お気に入りから外す";
    remove.addEventListener("click", () => {

      renderFavoriteList();
      updateFavoriteHeart();
      if (randomMode === "favorites" && currentIndex >= 0 && !isFavorite(quotes[currentIndex])) {
        showRandomQuote();
      }
    });

    wrapper.append(category, body, remove);
    favoriteItems.appendChild(wrapper);

}

function normalizeText(value) {
  return value
    .replace(/\u00a0/g, " ")
    .replace(/[\t\r\n]+/g, " ")
    .replace(/\s{2,}/g, " ")
    .replace(/｡/g, "。").replace(/､/g, "、")
    .replace(/｢/g, "「").replace(/｣/g, "」")
    .replace(/!/g, "！").replace(/\?/g, "？")
    .trim();
}

function looksLikeQuote(text) {
  if (!text || text.length < 8 || text.length > 500) return false;
  if (/^(目次|履歴書|台詞|カード画像|ステータス|最終更新|Menu|ホーム|編集|添付|一覧)/.test(text)) return false;
  if (/^(20\d{2}|獲得\s*\d+種類目|※|→)/.test(text)) return false;
  if (/^(ｱﾙﾊﾞﾑ|ｽｶｳﾄ|ﾁｪﾝｼﾞ|マイデスク|営業|ライブ|オーディション|信頼度|休憩時間|誕生日)/.test(text) && text.length < 25) return false;
  return /[。！？]|[!?]$/.test(text);
}

  let value = normalizeText(text);
  value = value
    .replace(/^(ｱﾙﾊﾞﾑ|アルバム|ｽｶｳﾄ|スカウト|ﾁｪﾝｼﾞ!?|チェンジ!?|ﾏｲﾃﾞｽｸ|マイデスク|営業|休憩時間|信頼度(?:UP|MAX)!?|ﾗｲﾌﾞ(?:準備|継続|成功)?|ライブ(?:準備|継続|成功)?|ｵｰﾃﾞｨｼｮﾝ[^ ]*|オーディション[^ ]*|上位ﾗﾝｸ喜びのひと言|朝のひと言|趣味について|労いの言葉|お出かけの前に|おやすみのひと言|日常のありがとう|ごはんについて|最近のお買い物|ただいまの挨拶|最近嬉しかったこと)\s*/i, "")
    .replace(/^\([^)]*\)\s*/, "")
    .trim();
  return value;
}

function nearestHeading(element) {
  let node = element;
  while (node) {
    let prev = node.previousElementSibling;
    while (prev) {
      if (/^H[2-6]$/.test(prev.tagName)) return normalizeText(prev.textContent);
      const inner = prev.querySelector && prev.querySelector("h2,h3,h4,h5,h6");
      if (inner) return normalizeText(inner.textContent);
      prev = prev.previousElementSibling;
    }
    node = node.parentElement;
    if (node && /^H[2-6]$/.test(node.tagName)) return normalizeText(node.textContent);
  }
  return "Wikiから読み込み";
}

function extractQuotesFromHtml(source) {
  const doc = new DOMParser().parseFromString(source, "text/html");
  doc.querySelectorAll("script,style,noscript,nav,header,footer,form,button").forEach(el => el.remove());

  const found = [];
  const seen = new Set();

  // 表の最終セルには台詞本文が入ることが多い
  doc.querySelectorAll("tr").forEach(row => {
    const cells = [...row.querySelectorAll(":scope > th, :scope > td")];
    if (!cells.length) return;
    const category = nearestHeading(row).replace(/^.*?〖/, "〖");
    const raw = cells[cells.length - 1].textContent;
    const text = cleanCandidate(raw);
    if (looksLikeQuote(text) && !seen.has(text)) {
      seen.add(text);
      found.push({ category: category || "Wikiから読み込み", text });
    }
  });

  // 表以外で独立している文章も候補にする
  doc.querySelectorAll("p,li,dd").forEach(el => {
    if (el.closest("tr")) return;
    const text = cleanCandidate(el.textContent);
    if (looksLikeQuote(text) && !seen.has(text)) {
      seen.add(text);
      found.push({ category: nearestHeading(el) || "Wikiから読み込み", text });
    }
  });

  return found.filter(item =>
    !/履歴書|目次|コメント|プロフィール/.test(item.category) &&
    !/Last-modified|wikiwiki|アイドルマスターsideM Wiki/.test(item.text)
  );
}

function showRandomQuote() {
  const pool = randomMode === "favorites" ? quotes.filter(isFavorite) : quotes;

  if (!pool.length) {
    currentIndex = -1;
    categoryEl.textContent = "お気に入り";
    quoteEl.textContent = "まだお気に入りがありません。右上の♡を押して追加してください。";
    countEl.textContent = `${quotes.length}件収録`;
    copyButton.textContent = "コピー";
    updateFavoriteHeart();
    return;
  }

  const currentItem = currentIndex >= 0 ? quotes[currentIndex] : null;
  let nextItem = currentItem;

  while (pool.length > 1 && nextItem === currentItem) {
    nextItem = pool[Math.floor(Math.random() * pool.length)];
  }
  if (pool.length === 1) nextItem = pool[0];

  currentIndex = quotes.findIndex(item => quoteId(item) === quoteId(nextItem));
  categoryEl.textContent = nextItem.category;
  quoteEl.textContent = nextItem.text;
  countEl.textContent = randomMode === "favorites"
    ? `${pool.length}件のお気に入り`
    : `${quotes.length}件収録`;
  copyButton.textContent = "コピー";
  updateFavoriteHeart();
}

async function copyCurrent() {
  if (currentIndex < 0) return;
  const text = quotes[currentIndex].text;
  try {
    await navigator.clipboard.writeText(text);
  } catch (e) {
    const area = document.createElement("textarea");
    area.value = text;
    document.body.appendChild(area);
    area.select();
    document.execCommand("copy");
    area.remove();
  }
  copyButton.textContent = "コピーしました";
}




favoriteHeart.addEventListener("click", () => {
  const item = quotes[currentIndex];
  if (!item) return;

  const id = quoteId(item);
  if (favorites.includes(id)) {
    favorites = favorites.filter(value => value !== id);
  } else {
    favorites.push(id);
  }

  saveFavorites();
  updateFavoriteHeart();
  renderFavoriteList();

  if (randomMode === "favorites" && !isFavorite(item)) {
    showRandomQuote();
  }
});

showFavoritesButton.addEventListener("click", () => {
  favoriteList.classList.toggle("is-open");
  showFavoritesButton.textContent = favoriteList.classList.contains("is-open")
    ? "一覧を閉じる"
    : "お気に入り一覧";
  renderFavoriteList();
});

modeAllButton.addEventListener("click", () => {
  randomMode = "all";
  modeAllButton.classList.add("active");
  modeFavoritesButton.classList.remove("active");
  showRandomQuote();
});

modeFavoritesButton.addEventListener("click", () => {
  randomMode = "favorites";
  modeFavoritesButton.classList.add("active");
  modeAllButton.classList.remove("active");
  showRandomQuote();
});

nextButton.addEventListener("click", showRandomQuote);
copyButton.addEventListener("click", copyCurrent);
document.addEventListener("keydown", event => {
  if (event.code === "Space" && event.target === document.body) {
    event.preventDefault();
    showRandomQuote();
  }
});

if (statusEl) statusEl.textContent = "全セリフ埋め込み済みの固定版です。";
showRandomQuote();
renderFavoriteList();
</script>
